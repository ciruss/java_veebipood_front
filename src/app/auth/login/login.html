<div class="container">
  <h1>Login</h1>
  <div class="input-container">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" />
  </div>
  <div class="input-container">
    <label>Password</label>
    <input type="password" [(ngModel)]="password" />
  </div>
  <button (click)="login()">Login</button>
</div>
